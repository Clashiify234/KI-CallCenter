<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent - KI CallCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; display: flex; height: 100vh; margin: 0; color: white; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .sidebar-collapsed { width: 60px !important; padding: 12px 6px !important; }
        .sidebar-collapsed .sidebar-hide { display: none !important; }
        .sidebar-collapsed .sidebar-header { justify-content: center !important; margin-bottom: 16px !important; }
        .sidebar-collapsed .sidebar-header > *:not(.sidebar-logo) { display: none !important; }
        .sidebar-collapsed nav { gap: 4px !important; align-items: center; }
        .sidebar-collapsed nav a { justify-content: center; padding: 10px; border-radius: 12px; width: 44px; height: 44px; margin: 0 auto; }
        .sidebar-collapsed nav a span { display: none !important; }
        aside { transition: width 0.2s ease; }
        input, textarea, select { font-size: 16px !important; }
        @supports (height: 100dvh) { body { height: 100dvh; } }
        * { -webkit-overflow-scrolling: touch; -webkit-tap-highlight-color: transparent; }

        @media (max-width: 1024px) {
            #sidebar { width: 88px !important; padding: 12px 8px !important; }
            #sidebar .sidebar-hide { display: none !important; }
            #sidebar nav a { flex-direction: column; justify-content: center; align-items: center; padding: 10px 4px; border-radius: 12px; gap: 4px !important; }
            #sidebar nav a span { display: block !important; font-size: 10px !important; opacity: 0.7; }
            #sidebar nav a svg { margin: 0; width: 24px; height: 24px; }
        }
        @media (max-width: 768px) {
            #sidebar { position: fixed !important; left: -300px; top: 0; height: 100vh; z-index: 1000; width: 280px !important; transition: left 0.3s ease; }
            #sidebar.mobile-open { left: 0; }
            #sidebar .sidebar-hide { display: flex !important; }
            .mobile-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
            .mobile-backdrop.active { display: block; }
            .mobile-menu-btn { display: flex !important; }
        }

        /* Call UI */
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
        .breathe { animation: breathe 3s ease-in-out infinite; }

        .call-btn {
            width: 96px; height: 96px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; border: none; position: relative;
        }
        .call-btn-start { background: #22c55e; }
        .call-btn-start:hover { background: #16a34a; transform: scale(1.05); }
        .call-btn-end { background: #ef4444; }
        .call-btn-end:hover { background: #dc2626; transform: scale(1.05); }

        .wave-bar {
            width: 3px; border-radius: 2px; background: white;
            min-height: 4px; transition: height 0.08s ease-out;
        }

        .transcript-bubble {
            padding: 12px 16px; border-radius: 16px; max-width: 85%;
            animation: fadeSlide 0.3s ease-out;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .transcript-user { background: #232323; border: 1px solid #2a2a2a; margin-left: auto; }
        .transcript-agent { background: #171717; border: 1px solid #2a2a2a; margin-right: auto; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-idle { background: #555; }
        .status-listening { background: #22c55e; animation: breathe 1.5s ease-in-out infinite; }
        .status-thinking { background: #eab308; animation: breathe 1s ease-in-out infinite; }
        .status-speaking { background: #3b82f6; animation: breathe 1s ease-in-out infinite; }
    </style>
</head>

<script>
// ============ State ============
let callActive = false;
let callStartTime = null;
let callTimerInterval = null;
let recognition = null;
let voiceHistory = [];
let isProcessing = false;
let isSpeaking = false;
let isMuted = false;
let audioContext = null;
let analyser = null;
let micStream = null;
let animFrame = null;
let availableVoices = [];
let audioUnlocked = false;
let silenceTimer = null;
let transcriptText = '';
let interimTranscript = '';
let currentAudio = null;
let typingInterval = null;
const SILENCE_TIMEOUT = 1500; // 1.5s silence = done speaking

// ============ Sidebar ============
document.getElementById('sidebar-toggle-btn')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('sidebar-collapsed');
});

// ============ Audio Unlock (browser autoplay policy) ============
function unlockAudio() {
    if (audioUnlocked) return;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    ctx.close();
    audioUnlocked = true;
}

// ============ Speech Recognition Setup ============
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
    document.getElementById('welcome-state').innerHTML = `
        <div class="w-24 h-24 rounded-full bg-[#171717] border border-[#2a2a2a] flex items-center justify-center mx-auto mb-6">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.12 1.49-.34 2.18"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </div>
        <h2 class="text-xl font-semibold mb-2 text-red-400">Browser nicht unterstützt</h2>
        <p class="text-[#666] text-[14px]">Bitte Chrome oder Edge verwenden für Speech Recognition.</p>
    `;
}

// ============ Call Toggle ============
function toggleCall() {
    unlockAudio();
    if (callActive) endCall();
    else startCall();
}

async function startCall() {
    console.log('[CALL] Starting call...');
    callActive = true;
    voiceHistory = [];
    transcriptText = '';
    interimTranscript = '';
    callStartTime = Date.now();

    // Request mic early
    try {
        if (!micStream) {
            console.log('[CALL] Requesting microphone...');
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const track = micStream.getAudioTracks()[0];
            console.log('[CALL] Microphone granted:', track.label, '| enabled:', track.enabled, '| muted:', track.muted, '| readyState:', track.readyState);

            // Check if audio is actually flowing
            const testCtx = new (window.AudioContext || window.webkitAudioContext)();
            const testSource = testCtx.createMediaStreamSource(micStream);
            const testAnalyser = testCtx.createAnalyser();
            testAnalyser.fftSize = 256;
            testSource.connect(testAnalyser);
            const testData = new Uint8Array(testAnalyser.frequencyBinCount);

            // Wait 500ms then check if we get any audio data
            await new Promise(r => setTimeout(r, 500));
            testAnalyser.getByteFrequencyData(testData);
            const maxLevel = Math.max(...testData);
            console.log('[CALL] Mic audio level test: max=' + maxLevel + ' (should be > 0 if mic works)');
            testCtx.close();

            if (maxLevel === 0) {
                console.warn('[CALL] WARNING: Microphone returns silence! Check Windows Privacy > Microphone settings');
                addTranscript('system', 'Mikrofon erkannt (' + track.label + ') aber kein Audio-Signal. Prüfe Windows Einstellungen > Datenschutz > Mikrofon');
            }
        }
    } catch (e) {
        console.error('[CALL] Mic access denied:', e);
        addTranscript('system', 'Mikrofon-Zugriff verweigert: ' + e.message);
        callActive = false;
        return;
    }

    // UI updates
    document.getElementById('welcome-state')?.remove();
    document.getElementById('call-btn').className = 'call-btn call-btn-end';
    document.getElementById('call-icon').innerHTML = '<line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.87"/><path d="M5 4.87a10.94 10.94 0 0 0 2.28 1.81"/><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.11 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>';
    document.getElementById('pulse-ring').style.display = 'block';
    document.getElementById('mute-btn').style.display = 'flex';
    document.getElementById('eleven-badge').style.display = 'flex';
    document.getElementById('waveform-container').style.display = 'flex';
    document.getElementById('live-text-container').style.display = 'flex';

    // Timer
    callTimerInterval = setInterval(updateTimer, 1000);

    // Agent greeting (non-blocking — always start listening after)
    setStatus('speaking', 'Agent spricht...');
    addTranscript('agent', 'Willkommen beim KI Contact Center. Wie kann ich Ihnen helfen?');
    console.log('[CALL] Playing greeting...');
    try {
        await speakTTS('Willkommen beim KI Contact Center. Wie kann ich Ihnen helfen?');
        console.log('[CALL] Greeting done');
    } catch (e) {
        console.log('[CALL] Greeting TTS failed, continuing anyway:', e);
    }
    isSpeaking = false;

    // Always start listening, even if greeting failed
    console.log('[CALL] Starting listening... callActive=' + callActive);
    if (callActive) startListening();
}

function endCall() {
    callActive = false;

    // Stop everything
    stopSpeaking();
    stopRecognition();
    stopWaveform();
    clearTimeout(silenceTimer);

    if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
    }

    clearInterval(callTimerInterval);
    const duration = document.getElementById('call-timer').textContent;

    // UI reset
    document.getElementById('call-btn').className = 'call-btn call-btn-start';
    document.getElementById('call-icon').innerHTML = '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>';
    document.getElementById('pulse-ring').style.display = 'none';
    document.getElementById('mute-btn').style.display = 'none';
    document.getElementById('eleven-badge').style.display = 'none';
    document.getElementById('waveform-container').style.display = 'none';
    document.getElementById('live-text-container').style.display = 'none';

    setStatus('idle', 'Bereit');
    addTranscript('system', `Anruf beendet (${duration})`);
    document.getElementById('call-timer').textContent = '00:00';
    isProcessing = false;
    isSpeaking = false;
}

// ============ Speech Recognition with Silence Detection ============
function createRecognition() {
    const rec = new SpeechRecognition();
    rec.lang = 'de-DE';
    rec.continuous = true;
    rec.interimResults = true;
    rec.maxAlternatives = 1;

    rec.onresult = (event) => {
        if (!callActive || isProcessing) return;

        let allFinal = '';
        let currentInterim = '';
        for (let i = 0; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
                allFinal += event.results[i][0].transcript;
            } else {
                currentInterim += event.results[i][0].transcript;
            }
        }

        transcriptText = allFinal;
        interimTranscript = currentInterim;
        const displayText = (transcriptText + ' ' + interimTranscript).trim();
        document.getElementById('live-text').textContent = displayText;
        console.log('[STT] Heard:', displayText);

        // Reset silence timer
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            if (!callActive || isProcessing || isSpeaking) return;
            const finalText = (transcriptText + ' ' + interimTranscript).trim();
            if (finalText) {
                console.log('[STT] Silence detected, sending:', finalText);
                stopRecognition();
                processUserInput(finalText);
            }
        }, SILENCE_TIMEOUT);
    };

    rec.onerror = (event) => {
        console.log('[STT] Error:', event.error);
        if (event.error === 'not-allowed') {
            addTranscript('system', 'Spracherkennung blockiert — erlaube Mikrofon-Zugriff');
        }
        // All other errors: let onend handle restart
    };

    rec.onend = () => {
        console.log('[STT] Ended. processing:', isProcessing, 'speaking:', isSpeaking);
        // Don't restart if we're processing or speaking — processUserInput will call startListening when done
        if (!callActive || isProcessing || isSpeaking || isMuted) return;
        // Auto-restart with fresh instance
        setTimeout(() => {
            if (callActive && !isProcessing && !isSpeaking && !isMuted) {
                console.log('[STT] Auto-restarting...');
                startListening();
            }
        }, 100);
    };

    return rec;
}

function startListening() {
    console.log('[LISTEN] startListening called');
    if (!callActive || isProcessing || isSpeaking || isMuted) {
        console.log('[LISTEN] Blocked:', { callActive, isProcessing, isSpeaking, isMuted });
        return;
    }

    // Kill old instance completely
    stopRecognition();

    transcriptText = '';
    interimTranscript = '';
    document.getElementById('live-text').textContent = '';
    setStatus('listening', 'Hört zu...');

    // Start waveform once for the call
    if (!animFrame) startWaveform();

    // Always fresh instance
    recognition = createRecognition();
    try {
        recognition.start();
        console.log('[STT] Started fresh instance');
    } catch (e) {
        console.error('[STT] Start failed:', e);
        recognition = null;
    }
}

function stopRecognition() {
    clearTimeout(silenceTimer);
    if (recognition) {
        const r = recognition;
        recognition = null;
        r.onend = null;
        r.onerror = null;
        r.onresult = null;
        try { r.abort(); } catch (e) {}
    }
}

// ============ Typing Sound (Web Audio API) ============
function playKeystroke() {
    if (!audioContext || audioContext.state === 'closed') return;
    const now = audioContext.currentTime;

    // Random variation for realism
    const freq = 800 + Math.random() * 1800;
    const duration = 0.025 + Math.random() * 0.035;
    const volume = 0.03 + Math.random() * 0.04;

    // Key click — short noise burst with bandpass filter
    const bufferSize = Math.ceil(audioContext.sampleRate * duration);
    const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        // Shaped noise with sharp attack, quick decay
        const env = Math.exp(-i / (bufferSize * 0.15));
        data[i] = (Math.random() * 2 - 1) * env;
    }

    const source = audioContext.createBufferSource();
    source.buffer = noiseBuffer;

    const bandpass = audioContext.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.value = freq;
    bandpass.Q.value = 1.5 + Math.random() * 2;

    const gain = audioContext.createGain();
    gain.gain.setValueAtTime(volume, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

    source.connect(bandpass);
    bandpass.connect(gain);
    gain.connect(audioContext.destination);
    source.start(now);
    source.stop(now + duration + 0.01);

    // Occasional heavier "spacebar" or "enter" thud
    if (Math.random() < 0.12) {
        const thudDuration = 0.05;
        const thudSize = Math.ceil(audioContext.sampleRate * thudDuration);
        const thudBuffer = audioContext.createBuffer(1, thudSize, audioContext.sampleRate);
        const thudData = thudBuffer.getChannelData(0);
        for (let i = 0; i < thudSize; i++) {
            const env = Math.exp(-i / (thudSize * 0.1));
            thudData[i] = (Math.random() * 2 - 1) * env;
        }
        const thudSource = audioContext.createBufferSource();
        thudSource.buffer = thudBuffer;
        const lowpass = audioContext.createBiquadFilter();
        lowpass.type = 'lowpass';
        lowpass.frequency.value = 400 + Math.random() * 200;
        const thudGain = audioContext.createGain();
        thudGain.gain.setValueAtTime(volume * 1.5, now);
        thudGain.gain.exponentialRampToValueAtTime(0.001, now + thudDuration);
        thudSource.connect(lowpass);
        lowpass.connect(thudGain);
        thudGain.connect(audioContext.destination);
        thudSource.start(now + 0.01);
        thudSource.stop(now + thudDuration + 0.02);
    }
}

function startTypingSound() {
    stopTypingSound();
    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (audioContext.state === 'suspended') audioContext.resume();

    // Irregular typing rhythm: burst of keystrokes with natural pauses
    let burstCount = 0;
    let burstLength = 3 + Math.floor(Math.random() * 8);

    function scheduleNext() {
        if (!typingInterval) return;
        playKeystroke();
        burstCount++;

        let delay;
        if (burstCount >= burstLength) {
            // Pause between word bursts (150-400ms)
            delay = 150 + Math.random() * 250;
            burstCount = 0;
            burstLength = 2 + Math.floor(Math.random() * 10);
        } else {
            // Between keystrokes in a burst (40-110ms like real typing)
            delay = 40 + Math.random() * 70;
        }
        typingInterval = setTimeout(scheduleNext, delay);
    }

    typingInterval = setTimeout(scheduleNext, 100);
    console.log('[TYPING] Started');
}

function stopTypingSound() {
    if (typingInterval) {
        clearTimeout(typingInterval);
        typingInterval = null;
        console.log('[TYPING] Stopped');
    }
}

// ============ Process Input → Streaming Claude → TTS ============
async function processUserInput(text) {
    if (isProcessing || !callActive || !text.trim()) return;
    isProcessing = true;

    document.getElementById('live-text').textContent = '';
    addTranscript('user', text);
    setStatus('thinking', 'Denkt nach...');
    startTypingSound();

    voiceHistory.push({ role: 'user', content: text });

    try {
        // Stream from Claude
        const res = await fetch('/api/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: text,
                history: voiceHistory.slice(-10),
                channel: 'voice'
            })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullResponse = '';
        let firstSentenceSent = false;
        let ttsPreloadPromise = null;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const data = JSON.parse(line.slice(6));

                    if (data.error) {
                        fullResponse = 'Entschuldigung, ein technischer Fehler ist aufgetreten.';
                        break;
                    }

                    if (data.chunk) {
                        fullResponse = data.full;

                        // TTS Pre-loading: fire TTS for first sentence while Claude keeps streaming
                        if (!firstSentenceSent && /[.!?]/.test(fullResponse)) {
                            firstSentenceSent = true;
                            const firstSentence = fullResponse.match(/^[^.!?]+[.!?]/)?.[0] || fullResponse;
                            ttsPreloadPromise = preloadTTS(firstSentence);
                        }
                    }

                    if (data.done) {
                        voiceHistory.push({ role: 'assistant', content: fullResponse });
                    }
                } catch (e) {}
            }
        }

        if (!callActive) { isProcessing = false; return; }

        // Show response in transcript
        stopTypingSound();
        addTranscript('agent', fullResponse);
        setStatus('speaking', 'Agent spricht...');

        // Speak the full response (preloaded first sentence makes this faster)
        await speakTTS(fullResponse, ttsPreloadPromise);

    } catch (err) {
        stopTypingSound();
        if (callActive) {
            addTranscript('agent', 'Verbindungsfehler.');
            await speakTTS('Entschuldigung, es gab einen Verbindungsfehler.');
        }
    }

    isProcessing = false;
    isSpeaking = false;

    // Auto-loop: immediately go back to listening
    if (callActive && !isMuted) {
        console.log('[CALL] Agent done speaking, starting listening immediately');
        startListening();
    }
}

// ============ ElevenLabs TTS ============
async function preloadTTS(text) {
    try {
        console.log('[TTS] Preloading:', text.substring(0, 60));
        const res = await fetch('/api/tts-elevenlabs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        if (res.ok) return await res.blob();
        console.warn('[TTS] Preload failed:', res.status);
    } catch (e) { console.warn('[TTS] Preload error:', e.message); }
    return null;
}

async function fetchTTSBlob(text) {
    try {
        console.log('[TTS] Fetching:', text.substring(0, 60));
        const res = await fetch('/api/tts-elevenlabs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        console.log('[TTS] ElevenLabs response:', res.status);
        if (res.ok) return await res.blob();
    } catch (e) { console.warn('[TTS] ElevenLabs fetch error:', e.message); }
    return null;
}

async function speakTTS(text, preloadedBlob) {
    if (!callActive) return;
    isSpeaking = true;

    // Split text into sentences for sequential playback
    const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
    console.log('[TTS] Speaking', sentences.length, 'sentence(s)');

    // Resolve preloaded blob (first sentence)
    let firstBlob = null;
    try {
        firstBlob = preloadedBlob instanceof Promise ? await preloadedBlob : preloadedBlob;
    } catch (e) {}

    // Prefetch all sentences in parallel immediately
    const blobPromises = sentences.map((s, i) => {
        if (i === 0 && firstBlob) return Promise.resolve(firstBlob);
        return fetchTTSBlob(s.trim());
    });

    for (let i = 0; i < sentences.length; i++) {
        if (!callActive) break;
        const sentence = sentences[i].trim();
        if (!sentence) continue;

        // Await the already-started fetch for this sentence
        const blob = await blobPromises[i];

        // Play audio for this sentence
        if (blob && blob.size > 100) {
            await playAudioBlob(blob);
        } else {
            await speakBrowserTTS(sentence);
        }
    }

    isSpeaking = false;
}

function playAudioBlob(blob) {
    return new Promise((resolve) => {
        const timeout = setTimeout(() => {
            console.log('[TTS] Sentence timeout — skipping');
            if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
            resolve();
        }, 15000);

        const url = URL.createObjectURL(blob);
        currentAudio = new Audio(url);
        console.log('[TTS] Playing audio:', blob.size, 'bytes');

        function done() {
            clearTimeout(timeout);
            URL.revokeObjectURL(url);
            currentAudio = null;
            resolve();
        }

        currentAudio.onended = () => { console.log('[TTS] Playback ended'); done(); };
        currentAudio.onerror = (e) => { console.error('[TTS] Audio error:', e); done(); };
        currentAudio.play().then(() => {
            console.log('[TTS] Playback started');
        }).catch((e) => {
            console.warn('[TTS] Autoplay blocked:', e.message);
            done();
        });
    });
}

function speakBrowserTTS(text) {
    return new Promise((resolve) => {
        console.log('[TTS] Falling back to browser TTS');
        try {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            utterance.rate = 0.9;
            utterance.pitch = 0.85;

            let resolved = false;
            const browserTimeout = setTimeout(() => {
                if (!resolved) { resolved = true; speechSynthesis.cancel(); resolve(); }
            }, 8000);

            utterance.onend = () => { if (!resolved) { resolved = true; clearTimeout(browserTimeout); resolve(); } };
            utterance.onerror = () => { if (!resolved) { resolved = true; clearTimeout(browserTimeout); resolve(); } };
            speechSynthesis.speak(utterance);
        } catch (e) {
            resolve();
        }
    });
}

function stopSpeaking() {
    speechSynthesis.cancel();
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.src = '';
        currentAudio = null;
    }
    isSpeaking = false;
}

// ============ UI Helpers ============
function setStatus(state, label) {
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('status-label');
    dot.className = 'status-dot status-' + state;
    lbl.textContent = label;

    const ring = document.getElementById('pulse-ring');
    if (state === 'listening') ring.style.background = 'rgba(34,197,94,0.3)';
    else if (state === 'thinking') ring.style.background = 'rgba(234,179,8,0.3)';
    else if (state === 'speaking') ring.style.background = 'rgba(59,130,246,0.3)';
}

function addTranscript(role, text) {
    const container = document.getElementById('transcript-messages');
    const div = document.createElement('div');

    if (role === 'system') {
        div.className = 'text-center py-2';
        div.innerHTML = `<span class="text-[11px] text-[#555] px-3 py-1 rounded-full bg-[#111] border border-[#222]">${text}</span>`;
    } else {
        div.className = 'flex ' + (role === 'user' ? 'justify-end' : 'justify-start');
        div.innerHTML = `
            <div class="transcript-bubble transcript-${role === 'user' ? 'user' : 'agent'}">
                ${role === 'agent' ? '<p class="text-[10px] text-[#666] mb-0.5">KI-Agent</p>' : '<p class="text-[10px] text-[#666] mb-0.5 text-right">Du</p>'}
                <p class="text-[14px] text-[#ddd] leading-relaxed">${text}</p>
            </div>
        `;
    }

    container.appendChild(div);
    document.getElementById('transcript-panel').scrollTop = document.getElementById('transcript-panel').scrollHeight;
}

function updateTimer() {
    if (!callStartTime) return;
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const sec = String(elapsed % 60).padStart(2, '0');
    document.getElementById('call-timer').textContent = `${min}:${sec}`;
}

function toggleMute() {
    isMuted = !isMuted;
    const btn = document.getElementById('mute-btn');
    if (isMuted) {
        btn.classList.add('bg-red-500/20', 'border-red-500/50');
        document.getElementById('mute-icon').innerHTML = '<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.12 1.49-.34 2.18"/><line x1="12" y1="19" x2="12" y2="22"/>';
        stopRecognition();
        stopWaveform();
        setStatus('idle', 'Stummgeschaltet');
    } else {
        btn.classList.remove('bg-red-500/20', 'border-red-500/50');
        document.getElementById('mute-icon').innerHTML = '<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line>';
        if (!isProcessing && !isSpeaking) startListening();
    }
}

// ============ Waveform Visualizer ============
async function startWaveform() {
    console.log('[WAVE] Starting waveform, micStream exists:', !!micStream);
    try {
        if (!micStream) {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        }
        if (audioContext) { try { audioContext.close(); } catch(e) {} }
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(micStream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 64;
        source.connect(analyser);

        const bars = document.querySelectorAll('.wave-bar');
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function draw() {
            animFrame = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            bars.forEach((bar, i) => {
                const val = dataArray[i] || 0;
                bar.style.height = Math.max(4, (val / 255) * 48) + 'px';
                bar.style.opacity = Math.max(0.3, val / 255);
            });
        }
        draw();
        console.log('[WAVE] Waveform running');
    } catch (e) {
        console.error('[WAVE] Waveform init failed:', e);
    }
}

function stopWaveform() {
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = null;
    if (audioContext) { try { audioContext.close(); } catch(e) {} audioContext = null; }
    document.querySelectorAll('.wave-bar').forEach(b => { b.style.height = '4px'; b.style.opacity = '1'; });
}
