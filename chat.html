<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Agent - KI CallCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; display: flex; height: 100vh; margin: 0; color: white; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .msg-user { background: #232323; border: 1px solid #2a2a2a; }
        .msg-agent { background: #171717; border: 1px solid #2a2a2a; }

        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #666; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

        .sidebar-collapsed { width: 60px !important; padding: 12px 6px !important; }
        .sidebar-collapsed .sidebar-hide { display: none !important; }
        .sidebar-collapsed .sidebar-header { justify-content: center !important; margin-bottom: 16px !important; }
        .sidebar-collapsed .sidebar-header > *:not(.sidebar-logo) { display: none !important; }
        .sidebar-collapsed nav { gap: 4px !important; align-items: center; }
        .sidebar-collapsed nav a { justify-content: center; padding: 10px; border-radius: 12px; width: 44px; height: 44px; margin: 0 auto; }
        .sidebar-collapsed nav a span { display: none !important; }
        .sidebar-collapsed nav a svg { margin: 0; width: 22px; height: 22px; }
        aside { transition: width 0.2s ease; }

        input, textarea, select { font-size: 16px !important; }
        @supports (height: 100dvh) { body { height: 100dvh; } }
        * { -webkit-overflow-scrolling: touch; -webkit-tap-highlight-color: transparent; }

        @media (max-width: 1024px) {
            #sidebar { width: 88px !important; padding: 12px 8px !important; }
            #sidebar .sidebar-hide { display: none !important; }
            #sidebar nav a { flex-direction: column; justify-content: center; align-items: center; padding: 10px 4px; border-radius: 12px; gap: 4px !important; }
            #sidebar nav a span { display: block !important; font-size: 10px !important; opacity: 0.7; }
            #sidebar nav a svg { margin: 0; width: 24px; height: 24px; }
        }
        @media (max-width: 768px) {
            #sidebar { position: fixed !important; left: -300px; top: 0; height: 100vh; z-index: 1000; width: 280px !important; transition: left 0.3s ease; }
            #sidebar.mobile-open { left: 0; }
            #sidebar .sidebar-hide { display: flex !important; }
            .mobile-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
            .mobile-backdrop.active { display: block; }
            .mobile-menu-btn { display: flex !important; }
        }
    </style>
</head>
<body class="antialiased">

<button class="mobile-menu-btn" style="display:none;position:fixed;top:12px;left:12px;z-index:998;background:#232323;border:1px solid #333;border-radius:8px;padding:8px;color:white;cursor:pointer;" onclick="document.getElementById('sidebar').classList.add('mobile-open');document.getElementById('mobile-backdrop').classList.add('active')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="mobile-backdrop" id="mobile-backdrop" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>

<!-- Sidebar -->
<aside id="sidebar" class="w-[280px] h-full bg-[#171717] flex flex-col p-4 border-r border-[#2a2a2a] shrink-0">
    <div class="sidebar-header flex items-center justify-between mb-8 px-1 mt-1">
        <a href="index.html" class="sidebar-logo text-white hover:opacity-80 transition-opacity flex items-center gap-2">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <span class="sidebar-hide font-semibold text-[15px]">KI CallCenter</span>
        </a>
        <div class="flex items-center gap-3 sidebar-hide">
            <button id="sidebar-toggle-btn" class="text-[#a0a0a0] bg-[#232323] border border-[#2e2e2e] p-1.5 rounded-lg hover:text-white hover:bg-[#252525] transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect><line x1="15" y1="3" x2="15" y2="21"></line></svg>
            </button>
        </div>
    </div>
    <nav class="flex flex-col gap-1.5 px-1">
        <a href="index.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
            <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span class="text-[15px] font-medium sidebar-hide">Dashboard</span>
        </a>
        <a href="chat.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg bg-[#232323] text-white">
            <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="text-[15px] font-medium sidebar-hide">Chat Agent</span>
        </a>
        <a href="voice.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
            <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <span class="text-[15px] font-medium sidebar-hide">Voice Agent</span>
        </a>
        <a href="knowledge.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
            <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span class="text-[15px] font-medium sidebar-hide">Knowledge Base</span>
        </a>
        <a href="tickets.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
            <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span class="text-[15px] font-medium sidebar-hide">Tickets</span>
        </a>
        <a href="analytics.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
            <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span class="text-[15px] font-medium sidebar-hide">Analytics</span>
        </a>
        <a href="settings.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
            <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span class="text-[15px] font-medium sidebar-hide">Settings</span>
        </a>
    </nav>
</aside>

<!-- Main Content -->
<main class="flex-1 flex flex-col overflow-hidden">
    <!-- Chat Header -->
    <div class="border-b border-[#2a2a2a] px-6 py-4 flex items-center justify-between shrink-0">
        <div>
            <h1 class="text-lg font-semibold">Chat Agent</h1>
            <p class="text-[#666] text-[13px]">KI-Service-Agent auf Basis von Claude</p>
        </div>
        <button onclick="chatHistory=[];renderMessages()" class="text-[13px] text-[#666] hover:text-white px-3 py-1.5 rounded-lg border border-[#333] hover:border-[#555] transition-colors">Neuer Chat</button>
    </div>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto px-6 py-6" id="chat-messages">
        <div class="max-w-3xl mx-auto">
            <!-- Welcome -->
            <div class="text-center py-16" id="welcome-screen">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#171717] border border-[#2a2a2a] mb-6">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <h2 class="text-xl font-semibold mb-2">KI Contact Center</h2>
                <p class="text-[#666] text-[15px] max-w-md mx-auto">Starte eine Konversation als Testkunde. Der KI-Agent wird basierend auf der Knowledge Base antworten.</p>
                <div class="flex flex-wrap justify-center gap-2 mt-6">
                    <button onclick="sendQuickMessage('Ich möchte den Status meiner Bestellung wissen')" class="text-[13px] px-4 py-2 rounded-full bg-[#171717] border border-[#2a2a2a] hover:border-[#444] text-[#ccc] hover:text-white transition-colors">Bestellstatus</button>
                    <button onclick="sendQuickMessage('Ich möchte eine Retoure einleiten')" class="text-[13px] px-4 py-2 rounded-full bg-[#171717] border border-[#2a2a2a] hover:border-[#444] text-[#ccc] hover:text-white transition-colors">Retoure</button>
                    <button onclick="sendQuickMessage('Ich habe eine Beschwerde')" class="text-[13px] px-4 py-2 rounded-full bg-[#171717] border border-[#2a2a2a] hover:border-[#444] text-[#ccc] hover:text-white transition-colors">Beschwerde</button>
                    <button onclick="sendQuickMessage('Welche Zahlungsmethoden bietet ihr an?')" class="text-[13px] px-4 py-2 rounded-full bg-[#171717] border border-[#2a2a2a] hover:border-[#444] text-[#ccc] hover:text-white transition-colors">Zahlung</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="border-t border-[#2a2a2a] px-6 py-4 shrink-0">
        <form id="chat-form" class="max-w-3xl mx-auto flex gap-3">
            <input type="text" id="chat-input" placeholder="Nachricht als Testkunde eingeben..." class="flex-1 bg-[#171717] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition-colors">
            <button type="submit" id="send-btn" class="bg-white text-black font-medium px-6 py-3 rounded-xl hover:bg-gray-200 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                Senden
            </button>
        </form>
    </div>
</main>

<script>
let chatHistory = [];
let isLoading = false;

document.getElementById('sidebar-toggle-btn')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('sidebar-collapsed');
});

function renderMessages() {
    const container = document.getElementById('chat-messages');
    const welcome = document.getElementById('welcome-screen');

    if (chatHistory.length === 0) {
        container.innerHTML = `<div class="max-w-3xl mx-auto">${welcome.outerHTML}</div>`;
        return;
    }

    container.innerHTML = '<div class="max-w-3xl mx-auto space-y-4">' +
        chatHistory.map(m => `
            <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                <div class="${m.role === 'user' ? 'msg-user' : 'msg-agent'} rounded-2xl px-4 py-3 max-w-[80%]">
                    ${m.role === 'assistant' ? '<p class="text-[11px] text-[#666] mb-1 font-medium">KI-Agent</p>' : ''}
                    <p class="text-[15px] text-[#e0e0e0] leading-relaxed">${m.content}</p>
                    ${m.ticketId ? `<p class="text-[11px] text-[#444] mt-2">${m.ticketId}</p>` : ''}
                </div>
            </div>
        `).join('') +
    '</div>';

    container.scrollTop = container.scrollHeight;
}

async function sendMessage(text) {
    if (isLoading || !text.trim()) return;
    isLoading = true;

    chatHistory.push({ role: 'user', content: text });
    renderMessages();

    // Show typing
    const container = document.getElementById('chat-messages');
    const typingEl = document.createElement('div');
    typingEl.className = 'flex justify-start mt-4';
    typingEl.id = 'typing-indicator';
    typingEl.innerHTML = `<div class="msg-agent rounded-2xl px-4 py-3"><div class="flex gap-1.5 py-1"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    container.querySelector('.max-w-3xl')?.appendChild(typingEl);
    container.scrollTop = container.scrollHeight;

    document.getElementById('send-btn').disabled = true;

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: text,
                history: chatHistory.filter(m => m.role !== 'system').slice(-10),
                channel: 'chat'
            })
        });
        const data = await res.json();

        if (data.error) {
            chatHistory.push({ role: 'assistant', content: 'Entschuldigung, es ist ein technischer Fehler aufgetreten. Bitte versuchen Sie es erneut.' });
        } else {
            chatHistory.push({ role: 'assistant', content: data.reply, ticketId: data.ticketId });
        }
    } catch (e) {
        chatHistory.push({ role: 'assistant', content: 'Verbindungsfehler. Bitte prüfen Sie, ob der Server läuft.' });
    }

    document.getElementById('typing-indicator')?.remove();
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    renderMessages();
}

function sendQuickMessage(text) {
    document.getElementById('chat-input').value = '';
    sendMessage(text);
}

document.getElementById('chat-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (text) {
        input.value = '';
        sendMessage(text);
    }
});
</script>
</body>
</html>
