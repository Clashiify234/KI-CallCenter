<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets - KI CallCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; display: flex; height: 100vh; margin: 0; color: white; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .ticket-row { background: #171717; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; transition: border-color 0.2s; cursor: pointer; }
        .ticket-row:hover { border-color: #444; }

        .status-resolved { color: #4ade80; }
        .status-open { color: #facc15; }
        .status-escalated { color: #f87171; }

        .sidebar-collapsed { width: 60px !important; padding: 12px 6px !important; }
        .sidebar-collapsed .sidebar-hide { display: none !important; }
        .sidebar-collapsed .sidebar-header { justify-content: center !important; margin-bottom: 16px !important; }
        .sidebar-collapsed .sidebar-header > *:not(.sidebar-logo) { display: none !important; }
        .sidebar-collapsed nav { gap: 4px !important; align-items: center; }
        .sidebar-collapsed nav a { justify-content: center; padding: 10px; border-radius: 12px; width: 44px; height: 44px; margin: 0 auto; }
        .sidebar-collapsed nav a span { display: none !important; }
        aside { transition: width 0.2s ease; }
        input, textarea, select { font-size: 16px !important; }
        @supports (height: 100dvh) { body { height: 100dvh; } }
        * { -webkit-overflow-scrolling: touch; -webkit-tap-highlight-color: transparent; }

        @media (max-width: 1024px) {
            #sidebar { width: 88px !important; padding: 12px 8px !important; }
            #sidebar .sidebar-hide { display: none !important; }
            #sidebar nav a { flex-direction: column; justify-content: center; align-items: center; padding: 10px 4px; border-radius: 12px; gap: 4px !important; }
            #sidebar nav a span { display: block !important; font-size: 10px !important; opacity: 0.7; }
            #sidebar nav a svg { margin: 0; width: 24px; height: 24px; }
        }
        @media (max-width: 768px) {
            #sidebar { position: fixed !important; left: -300px; top: 0; height: 100vh; z-index: 1000; width: 280px !important; transition: left 0.3s ease; }
            #sidebar.mobile-open { left: 0; }
            #sidebar .sidebar-hide { display: flex !important; }
            .mobile-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
            .mobile-backdrop.active { display: block; }
            .mobile-menu-btn { display: flex !important; }
        }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="antialiased">

<button class="mobile-menu-btn" style="display:none;position:fixed;top:12px;left:12px;z-index:998;background:#232323;border:1px solid #333;border-radius:8px;padding:8px;color:white;cursor:pointer;" onclick="document.getElementById('sidebar').classList.add('mobile-open');document.getElementById('mobile-backdrop').classList.add('active')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="mobile-backdrop" id="mobile-backdrop" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>

<aside id="sidebar" class="w-[280px] h-full bg-[#171717] flex flex-col p-4 border-r border-[#2a2a2a] shrink-0">
    <div class="sidebar-header flex items-center justify-between mb-8 px-1 mt-1">
        <a href="index.html" class="sidebar-logo text-white hover:opacity-80 transition-opacity flex items-center gap-2">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <span class="sidebar-hide font-semibold text-[15px]">KI CallCenter</span>
        </a>
        <div class="flex items-center gap-3 sidebar-hide">
            <button id="sidebar-toggle-btn" class="text-[#a0a0a0] bg-[#232323] border border-[#2e2e2e] p-1.5 rounded-lg hover:text-white hover:bg-[#252525] transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect><line x1="15" y1="3" x2="15" y2="21"></line></svg>
            </button>
        </div>
    </div>
    <nav class="flex flex-col gap-1.5 px-1">
        <a href="index.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span class="text-[15px] font-medium sidebar-hide">Dashboard</span></a>
        <a href="chat.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="text-[15px] font-medium sidebar-hide">Chat Agent</span></a>
        <a href="voice.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span class="text-[15px] font-medium sidebar-hide">Voice Agent</span></a>
        <a href="knowledge.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="text-[15px] font-medium sidebar-hide">Knowledge Base</span></a>
        <a href="tickets.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg bg-[#232323] text-white"><svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="text-[15px] font-medium sidebar-hide">Tickets</span></a>
        <a href="analytics.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span class="text-[15px] font-medium sidebar-hide">Analytics</span></a>
        <a href="settings.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="text-[15px] font-medium sidebar-hide">Settings</span></a>
    </nav>
</aside>

<!-- Ticket Detail Modal -->
<div class="modal-overlay" id="detail-modal">
    <div class="bg-[#171717] border border-[#2a2a2a] rounded-2xl p-6 w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold" id="modal-ticket-id"></h3>
            <button onclick="document.getElementById('detail-modal').classList.remove('active')" class="text-[#666] hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="modal-content" class="space-y-4"></div>
    </div>
</div>

<!-- Main Content -->
<main class="flex-1 overflow-y-auto p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-semibold mb-1">Tickets</h1>
                <p class="text-[#888] text-[15px]">Alle Kundenkontakte und deren Status</p>
            </div>
            <div class="flex gap-2">
                <select id="filter-status" class="bg-[#171717] border border-[#2a2a2a] rounded-lg px-3 py-2 text-[13px] text-[#ccc] focus:outline-none">
                    <option value="all">Alle Status</option>
                    <option value="resolved">Gelöst</option>
                    <option value="open">Offen</option>
                    <option value="escalated">Eskaliert</option>
                </select>
                <select id="filter-channel" class="bg-[#171717] border border-[#2a2a2a] rounded-lg px-3 py-2 text-[13px] text-[#ccc] focus:outline-none">
                    <option value="all">Alle Kanäle</option>
                    <option value="chat">Chat</option>
                    <option value="voice">Voice</option>
                    <option value="email">E-Mail</option>
                </select>
            </div>
        </div>

        <div class="space-y-2" id="ticket-list">
            <p class="text-[#555] text-center py-12">Noch keine Tickets. Starte einen Chat, um Tickets zu generieren.</p>
        </div>
    </div>
</main>

<script>
document.getElementById('sidebar-toggle-btn')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('sidebar-collapsed');
});

let allTickets = [];

async function loadTickets() {
    try {
        const res = await fetch('/api/tickets');
        allTickets = await res.json();
        renderTickets();
    } catch (e) {}
}

function renderTickets() {
    const statusFilter = document.getElementById('filter-status').value;
    const channelFilter = document.getElementById('filter-channel').value;

    let filtered = allTickets;
    if (statusFilter !== 'all') filtered = filtered.filter(t => t.status === statusFilter);
    if (channelFilter !== 'all') filtered = filtered.filter(t => t.channel === channelFilter);

    const container = document.getElementById('ticket-list');
    if (filtered.length === 0) {
        container.innerHTML = '<p class="text-[#555] text-center py-12">Keine Tickets gefunden.</p>';
        return;
    }

    container.innerHTML = filtered.reverse().map(t => `
        <div class="ticket-row flex items-center gap-4" onclick="showTicket('${t.id}')">
            <span class="text-[13px] text-[#666] w-20 shrink-0 font-mono">${t.id}</span>
            <span class="text-[11px] px-2 py-0.5 rounded-full shrink-0 ${t.channel === 'chat' ? 'bg-white/10 text-white' : t.channel === 'voice' ? 'bg-[#333] text-[#ccc]' : 'bg-[#222] text-[#999]'}">${t.channel}</span>
            <span class="text-[14px] text-[#ccc] flex-1 truncate">${t.message}</span>
            <span class="text-[12px] status-${t.status} shrink-0">${t.status === 'resolved' ? 'Gelöst' : t.status === 'escalated' ? 'Eskaliert' : 'Offen'}</span>
            <span class="text-[11px] text-[#555] shrink-0 w-14 text-right">${new Date(t.date).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'})}</span>
        </div>
    `).join('');
}

function showTicket(id) {
    const t = allTickets.find(t => t.id === id);
    if (!t) return;
    document.getElementById('modal-ticket-id').textContent = t.id;
    document.getElementById('modal-content').innerHTML = `
        <div class="flex gap-2 flex-wrap">
            <span class="text-[11px] px-2 py-0.5 rounded-full bg-[#232323] text-[#888]">${t.channel}</span>
            <span class="text-[11px] px-2 py-0.5 rounded-full bg-[#232323] status-${t.status}">${t.status}</span>
            <span class="text-[11px] px-2 py-0.5 rounded-full bg-[#232323] text-[#888]">${new Date(t.date).toLocaleString('de-DE')}</span>
        </div>
        <div>
            <p class="text-[13px] text-[#666] mb-1">Kundenanfrage</p>
            <p class="text-[15px] text-[#e0e0e0] bg-[#232323] rounded-xl p-3">${t.message}</p>
        </div>
        <div>
            <p class="text-[13px] text-[#666] mb-1">Agent-Antwort</p>
            <p class="text-[15px] text-[#e0e0e0] bg-[#232323] rounded-xl p-3">${t.reply || '-'}</p>
        </div>
        <div class="flex gap-2 pt-2">
            <button onclick="updateStatus('${t.id}','resolved')" class="text-[12px] px-3 py-1.5 rounded-lg border border-[#333] hover:border-green-500/50 text-[#888] hover:text-green-400 transition-colors">Als gelöst markieren</button>
            <button onclick="updateStatus('${t.id}','escalated')" class="text-[12px] px-3 py-1.5 rounded-lg border border-[#333] hover:border-red-500/50 text-[#888] hover:text-red-400 transition-colors">Eskalieren</button>
        </div>
    `;
    document.getElementById('detail-modal').classList.add('active');
}

async function updateStatus(id, status) {
    await fetch('/api/tickets/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
    });
    document.getElementById('detail-modal').classList.remove('active');
    loadTickets();
}

document.getElementById('filter-status').addEventListener('change', renderTickets);
document.getElementById('filter-channel').addEventListener('change', renderTickets);
loadTickets();
</script>
</body>
</html>
